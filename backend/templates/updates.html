<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Updates / Release Notes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f8f9fa;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .updates {
            padding: 40px 30px;
        }

        .update-card {
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            margin-bottom: 25px;
            padding: 30px;
            transition: all 0.3s ease;
            position: relative;
        }

        .update-card:hover {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transform: translateY(-2px);
        }

        .update-card::before {
            content: '';
            position: absolute;
            left: 0;
            top: 30px;
            width: 4px;
            height: calc(100% - 60px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .update-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .update-date {
            color: #7f8c8d;
            font-size: 0.95rem;
            margin-bottom: 15px;
            font-weight: 500;
        }

        .update-description {
            font-size: 1.1rem;
            color: #555;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .update-changes {
            list-style: none;
        }

        .update-changes li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: #444;
        }

        .update-changes li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #667eea;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .no-updates {
            text-align: center;
            color: #7f8c8d;
            font-style: italic;
            padding: 60px 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .update-card {
                padding: 25px 20px;
                margin-bottom: 20px;
            }

            .update-title {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Project Updates / Release Notes</h1>
            <p>Stay informed about the latest improvements and features</p>
        </div>

        <div class="updates" id="updates">
            <div class="no-updates">Loading updates...</div>
        </div>
    </div>

    <script>
async function loadUpdates() {
    const container = document.getElementById('updates');

    try {
        const res = await fetch('/api/updates');
        const data = await res.json();

        container.innerHTML = '';

        if (data.success && data.updates.length > 0) {
            data.updates.forEach(update => {
                const div = document.createElement('div');
                div.className = 'update-card';

                div.innerHTML = `
                    <div class="update-title">${update.title}</div>
                    <div class="update-date">${update.date}</div>
                    <div class="update-description">${update.description}</div>
                    <ul class="update-changes">
                        ${update.changes.map(c => `<li>${c}</li>`).join('')}
                    </ul>
                `;

                container.appendChild(div);
            });
        } else {
            container.innerHTML = '<div class="no-updates">No commits found</div>';
        }

    } catch (err) {
        container.innerHTML = `<div class="no-updates">Error: ${err.message}</div>`;
    }
}

loadUpdates();
</script>
</body>
</html>
